apiVersion: v1
kind: ServiceAccount
metadata:
  name: nccl-healthcheck
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nccl-healthcheck-node-reader
rules:
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nccl-healthcheck-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nccl-healthcheck-node-reader
subjects:
- kind: ServiceAccount
  name: nccl-healthcheck
  namespace: default
---
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-healthcheck
spec:
  slotsPerWorker: 4
  runPolicy:
    cleanPodPolicy: "None"
  sshAuthMountPath: /root/.ssh
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        metadata:
          labels:
            nccl-test-replica: mpi-launcher
        spec:
          serviceAccountName: nccl-healthcheck
          restartPolicy: Never
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          containers:
          - name: mpi-launcher
            image: iad.ocir.io/idxzjcdglx2s/nccl-tests:cuda-13.2.0-ubuntu-24.04-nccl-2.29.7-040926.1
            ports:
            - { name: mpijob-port, containerPort: 2222, protocol: TCP }
            resources:
              requests:
                cpu: "2"
                memory: "8Gi"
            env:
            - name: GROUP_SIZES
              value: "2"
            - name: TEST_MODE
              value: "all"
            - name: BW_THRESHOLD_2NODE
              value: "350"
            - name: BW_THRESHOLD_DEFAULT
              value: "350"
            - name: NUM_GPUS
              value: "4"
            - name: MAX_PARALLEL
              value: "0"
            - name: SAME_LOCAL_BLOCK_ONLY
              value: "false"
            - name: ORDERED_HOSTFILE
              value: "false"
            - name: BIND_TO
              value: "numa"
            - name: MAP_BY
              value: ""
            # Shape-specific mpirun and NCCL test args (GB200-v3.4)
            - name: MPIRUN_EXTRA_ARGS
              value: >-
                --mca pml ucx
                -x NCCL_DEBUG=WARN
                -x NCCL_MNNVL_ENABLE=1
                -x UCX_NET_DEVICES=eth0
                -x NCCL_IB_HCA==mlx5_0,mlx5_1,mlx5_2,mlx5_3,mlx5_5,mlx5_6,mlx5_7,mlx5_8
                -x NCCL_SOCKET_IFNAME=eth0
                -x NCCL_NET_GDR_C2C=1
                -x NCCL_IB_GID_INDEX=3
                -x NCCL_IB_TC=41
                -x NCCL_IB_SL=0
                -x NCCL_IB_TIMEOUT=22
                -x RX_QUEUE_LEN=8192
                -x IB_RX_QUEUE_LEN=8192
                -x HCOLL_ENABLE_MCAST_ALL=0
                -x coll_hcoll_enable=0
                -x NCCL_BUFFSIZE=16777216
                -x NCCL_IB_QPS_PER_CONNECTION=4
                -x NCCL_IB_SPLIT_DATA_ON_QPS=0
                -x NCCL_NVLS_ENABLE=0
                -x NCCL_DMABUF_ENABLE=1
                -x NCCL_NET_PLUGIN=sys
            - name: NCCL_TEST_ARGS
              value: "-b 8 -e 32G -f 2 -g 1"
            command: ["/workspace/nccl-healthcheck.py"]
    Worker:
      replicas: 2
      template:
        metadata:
          labels:
            nccl-test-replica: mpi-worker
        spec:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          nodeSelector:
            node.kubernetes.io/instance-type: BM.GPU.GB200-v3.4
          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          volumes:
          - { name: devinf, hostPath: { path: /dev/infiniband }}
          - { name: shm, emptyDir: { medium: Memory, sizeLimit: 32Gi }}
          containers:
          - name: mpi-worker
            ports:
            - { name: mpijob-port, containerPort: 2222, protocol: TCP }
            volumeMounts:
            - { mountPath: /dev/infiniband, name: devinf }
            - { mountPath: /dev/shm, name: shm }
            securityContext:
              privileged: true
              capabilities:
                add: ["IPC_LOCK"]
            image: iad.ocir.io/idxzjcdglx2s/nccl-tests:cuda-13.2.0-ubuntu-24.04-nccl-2.29.7-040926.1
            command:
              - /bin/bash
              - -c
              - mkdir -p /var/run/sshd; /usr/sbin/sshd -D -p 2222;
            resources:
              limits:
                nvidia.com/gpu: 4
