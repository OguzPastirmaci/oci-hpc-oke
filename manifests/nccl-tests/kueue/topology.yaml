# Topology resource for Kueue Topology-Aware Scheduling (TAS).
# Apply once per cluster to enable topology-aware scheduling for RDMA workloads.
# If this resource exists and a ResourceFlavor references it via topologyName,
# Kueue will schedule pods based on OCI RDMA network topology.
apiVersion: kueue.x-k8s.io/v1beta1
kind: Topology
metadata:
  name: oci-rdma
spec:
  levels:
  - nodeLabel: "oci.oraclecloud.com/rdma.hpc_island_id"
  - nodeLabel: "oci.oraclecloud.com/rdma.network_block_id"
  - nodeLabel: "oci.oraclecloud.com/rdma.local_block_id"
  - nodeLabel: "kubernetes.io/hostname"
