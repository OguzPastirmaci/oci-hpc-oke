name: CI - Apply (Terraform)

on:
  workflow_dispatch:
    inputs:
      tfvars:
        description: "tfvars configuration to apply"
        required: true
        type: choice
        default: "tfvars/core/cluster-only.tfvars"
        options:
          - tfvars/core/cluster-only.tfvars
          - tfvars/core/all-public-bastion-operator.tfvars
          - tfvars/core/all-private.tfvars
          - tfvars/core/all-private-operator.tfvars
          - tfvars/core/all-private-bastion-service.tfvars
          - tfvars/core/cluster-only.tfvars,tfvars/monitoring/monitoring.tfvars
          - tfvars/core/cluster-only.tfvars,tfvars/storage/fss.tfvars
          - tfvars/core/cluster-only.tfvars,tfvars/storage/lustre.tfvars

  issue_comment:
    types: [created]

  # schedule:
  #   - cron: '0 2 * * 1-5'  # Weeknights at 02:00 UTC

# Never run two apply jobs at the same time — parallel apply jobs would
# provision duplicate clusters and leave orphaned resources if cancelled.
# PR-triggered runs get their own concurrency group per PR number.
concurrency:
  group: ${{ github.event_name == 'issue_comment' && format('ci-apply-terraform-pr-{0}', github.event.issue.number) || 'ci-apply-terraform' }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GIT_TEMPLATE_DIR: ""  # workaround for missing git hook templates on ubuntu-24.04 runners

permissions:
  contents: read
  pull-requests: write  # needed to post the rocket reaction on the trigger comment

jobs:
  # ---------------------------------------------------------------------------
  # Gate: verify the /ok-to-apply comment is authorized. Skipped entirely for
  # workflow_dispatch so the apply job runs unconditionally in that case.
  # ---------------------------------------------------------------------------
  check-apply-trigger:
    name: Check apply trigger
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/ok-to-apply') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    outputs:
      tfvars: ${{ steps.parse.outputs.tfvars }}
    steps:
      - name: React to trigger comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            })

      - name: Parse tfvars from comment
        id: parse
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          # Extract everything after /ok-to-apply, trim whitespace
          tfvars=$(echo "$COMMENT" | grep -oP '(?<=/ok-to-apply\s)\S+.*' | xargs || true)
          if [ -z "$tfvars" ]; then
            tfvars="tfvars/core/cluster-only.tfvars"
          fi
          echo "tfvars=$tfvars" >> "$GITHUB_OUTPUT"

  apply-terraform:
    name: Terraform provisioning
    needs: [check-apply-trigger]
    # Run for workflow_dispatch (gate is skipped) or after a successful gate
    if: always() && (github.event_name == 'workflow_dispatch' || needs.check-apply-trigger.result == 'success')
    runs-on: ubuntu-latest
    # Generous timeout: cluster create ~45 min + Helm deploys + destroy ~20 min
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: test/go.mod
          cache: true
          cache-dependency-path: test/go.sum

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Cache Terraform providers
        uses: actions/cache@v4
        with:
          path: terraform/.terraform
          key: terraform-${{ hashFiles('terraform/versions.tf', 'terraform/.terraform.lock.hcl') }}
          restore-keys: terraform-

      - name: Set up OCI credentials
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_API_KEY_FINGERPRINT: ${{ secrets.OCI_API_KEY_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_API_KEY_PRIVATE_KEY: ${{ secrets.OCI_API_KEY_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.oci
          printf '[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=%s\nkey_file=%s\n' \
            "$OCI_USER_OCID" \
            "$OCI_API_KEY_FINGERPRINT" \
            "$OCI_TENANCY_OCID" \
            "$OCI_REGION" \
            "$HOME/.oci/oci_api_key.pem" > ~/.oci/config
          printf '%s' "$OCI_API_KEY_PRIVATE_KEY" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem ~/.oci/config

      - name: Run Terraform provisioning test
        working-directory: test
        env:
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_OCID: ${{ secrets.OCI_COMPARTMENT_OCID }}
          WORKER_OPS_AD: ${{ vars.WORKER_OPS_AD }}
          WORKER_OPS_IMAGE_CUSTOM_ID: ${{ vars.WORKER_OPS_IMAGE_CUSTOM_ID }}
          SSH_PUBLIC_KEY: ${{ vars.SSH_PUBLIC_KEY }}
          TFVARS_FILE: ${{ inputs.tfvars || needs.check-apply-trigger.outputs.tfvars || 'tfvars/core/cluster-only.tfvars' }}
        run: go test -v -count=1 -run TestCoreProvisioning -timeout 150m ./...
