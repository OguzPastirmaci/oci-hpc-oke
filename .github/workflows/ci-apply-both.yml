name: CI - Apply (Both)

on:
  issue_comment:
    types: [created]

concurrency:
  group: ci-apply-both-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Gate: verify /ok-to-run-apply-both comment is authorized.
  # ---------------------------------------------------------------------------
  check-both-trigger:
    name: Check apply-both trigger
    if: >-
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/ok-to-run-apply-both') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    steps:
      - name: React to trigger comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket'
            })

  # ---------------------------------------------------------------------------
  # Run both apply workflows in parallel.
  # Terraform: cluster-only tfvars (fastest meaningful config).
  # ORM:       all-public-orm topology.
  # ---------------------------------------------------------------------------
  apply-terraform:
    name: Apply (Terraform)
    needs: check-both-trigger
    if: always() && needs.check-both-trigger.result == 'success'
    uses: ./.github/workflows/ci-apply-core.yml
    with:
      tfvars: tfvars/core/cluster-only.tfvars
      pr_number: ${{ github.event.issue.number }}
    secrets: inherit

  apply-orm:
    name: Apply (ORM)
    needs: check-both-trigger
    if: always() && needs.check-both-trigger.result == 'success'
    uses: ./.github/workflows/ci-apply-orm.yml
    with:
      topology: all-public-orm
      pr_number: ${{ github.event.issue.number }}
    secrets: inherit
